<?xml version="1.0" encoding="UTF-8"?>
<!--
  SlothBox app icon.

  Visual: rounded square in brand graphite (#0a0a0a) with a centred padlock
  glyph in soft gold (#c9a86a). The padlock body is angular, the shackle is
  open at the top right — symbolising "encryption that the receiver controls,
  not the platform". 32x32 viewBox, vector so it scales to every favicon
  resolution browsers ask for.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Padlock shackle (open at top-right) -->
  <path d="M11 14 V11 a5 5 0 0 1 10 0 v3"
        stroke="#c9a86a" stroke-width="2.4" fill="none"
        stroke-linecap="round"/>
  <!-- Padlock body -->
  <rect x="8.5" y="13.5" width="15" height="11" rx="1.6" fill="#c9a86a"/>
  <!-- Keyhole -->
  <circle cx="16" cy="18.5" r="1.6" fill="#0a0a0a"/>
  <rect x="15.25" y="18.5" width="1.5" height="3.2" fill="#0a0a0a"/>
</svg>
