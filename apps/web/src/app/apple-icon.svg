<?xml version="1.0" encoding="UTF-8"?>
<!--
  iOS home-screen icon. iOS used to demand a 180x180 PNG; modern Safari
  accepts SVG. Same glyph as icon.svg, scaled up + a slightly larger
  shackle to read at large sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="36" fill="#0a0a0a"/>
  <path d="M62 80 V62 a28 28 0 0 1 56 0 v18"
        stroke="#c9a86a" stroke-width="13" fill="none"
        stroke-linecap="round"/>
  <rect x="48" y="76" width="84" height="64" rx="8" fill="#c9a86a"/>
  <circle cx="90" cy="104" r="9" fill="#0a0a0a"/>
  <rect x="86" y="104" width="8" height="20" fill="#0a0a0a"/>
</svg>
