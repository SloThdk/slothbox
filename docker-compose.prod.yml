# Production overlay — container hardening on top of docker-compose.yml.
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this layer adds, in addition to the base compose:
#
#   1. Read-only root filesystems on every stateless container. Anything
#      that legitimately needs to write goes via a tmpfs mount or a named
#      volume — nothing else can touch disk.
#   2. cap_drop: ALL with explicit cap_add allowlists. By default Docker
#      gives containers a generous default capability set (CHOWN, DAC_OVERRIDE,
#      SETGID, ...). We strip everything and re-add only what each service
#      genuinely needs (Caddy needs NET_BIND_SERVICE for ports 80/443,
#      everything else needs nothing).
#   3. security_opt: no-new-privileges:true everywhere. Prevents a child
#      process from gaining more privileges than its parent — defeats setuid
#      escalation if a binary in the image is suid'd by mistake.
#   4. CPU + memory resource limits so a runaway container can't take down
#      the whole host. Enforced by the kernel's cgroup v2 controller.
#   5. Log rotation via the json-file driver (10 MB per file, 3 generations).
#      Without this, /var/log/docker/containers can fill the disk in days
#      under steady traffic.
#   6. Loopback-only port removals on postgres / minio / grafana. The base
#      compose binds them to 127.0.0.1 for local dev convenience; in
#      production they live on the internal network only and are accessed
#      via Caddy under authenticated paths.
#   7. Pulled images from GHCR instead of local builds — reproducible
#      artefacts pinned to specific git SHAs.
#   8. Postgres data-checksums + WAL retention tuning.
#   9. Postgres pg_dump backup sidecar with rotation (28-day retention).

# ─── Defaults applied to every service ────────────────────────────────
# Anchors so we don't repeat 13 times. Compose merges these into the
# per-service blocks below.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

x-default-security: &default-security
  - no-new-privileges:true

services:
  # ─── Caddy (TLS edge) ──────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    environment:
      - DOMAIN=${DOMAIN}
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    cap_drop:
      - ALL
    cap_add:
      # NET_BIND_SERVICE: bind low ports (80, 443) without root.
      # SETUID/SETGID: drop to non-root after binding.
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 64M

  # ─── Frontend ─────────────────────────────────────────────────────
  web:
    # In production we run images that the Deploy workflow pushed to GHCR.
    # Until the first auto-deploy completes we fall back to the local build
    # configured in the base compose. To pin to a specific GHCR image,
    # uncomment + bump IMAGE_TAG in .env:
    #   image: ghcr.io/slothdk/slothbox-web:${IMAGE_TAG:-latest}
    read_only: true
    tmpfs:
      # Next caches static asset transforms here at runtime.
      - /tmp:size=128M,mode=1777
      - /app/apps/web/.next/cache:size=64M,mode=0755
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 128M

  # ─── API gateway (Hono) ───────────────────────────────────────────
  api-gateway:
    # See web service comment re: GHCR image pinning vs local build.
    # image: ghcr.io/slothdk/slothbox-api-gateway:${IMAGE_TAG:-latest}
    read_only: true
    tmpfs:
      - /tmp:size=32M,mode=1777
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.00"
        reservations:
          memory: 128M

  # ─── Ingest (.NET, large bodies) ──────────────────────────────────
  ingest:
    # See web service comment re: GHCR image pinning vs local build.
    # image: ghcr.io/slothdk/slothbox-ingest:${IMAGE_TAG:-latest}
    read_only: true
    tmpfs:
      # .NET writes /tmp during HTTP request processing. 256M is enough for
      # the in-flight chunk decode buffer (10 MB cap × ~25 concurrent uploads).
      - /tmp:size=256M,mode=1777
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.50"
        reservations:
          memory: 256M

  # ─── Receipt (.NET stub for v0.1) ─────────────────────────────────
  receipt:
    # See web service comment re: GHCR image pinning vs local build.
    # image: ghcr.io/slothdk/slothbox-receipt:${IMAGE_TAG:-latest}
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 64M

  # ─── Reaper (Go, distroless) ──────────────────────────────────────
  reaper:
    # See web service comment re: GHCR image pinning vs local build.
    # image: ghcr.io/slothdk/slothbox-reaper:${IMAGE_TAG:-latest}
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
        reservations:
          memory: 16M

  # ─── Postgres ─────────────────────────────────────────────────────
  postgres:
    # Strip the dev loopback binding — postgres is internal-only in prod.
    ports: []
    environment:
      # data-checksums detect silent disk corruption (page-level CRC checks).
      # Worth the ~2% write overhead; impossible to enable post-init.
      - POSTGRES_INITDB_ARGS=--data-checksums
    # Postgres needs to write to /var/lib/postgresql/data (named volume) but
    # nothing else, so read_only with one tmpfs for /tmp is safe.
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run/postgresql:size=16M,mode=0755
    cap_drop:
      - ALL
    cap_add:
      # SETGID/SETUID/CHOWN/DAC_READ_SEARCH/FOWNER: postgres init drops to
      # the postgres user and chowns the data directory.
      - SETUID
      - SETGID
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.00"
        reservations:
          memory: 512M

  # ─── MinIO ────────────────────────────────────────────────────────
  minio:
    # No public binding — MinIO is internal-only.
    ports: []
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.50"
        reservations:
          memory: 256M

  # ─── Valkey ───────────────────────────────────────────────────────
  valkey:
    # NOT read_only — Valkey image's start hook scans /data/appendonlydir
    # via `find` which needs DAC_READ_SEARCH on traverse, plus the AOF
    # writer needs to create rotated files in the same dir. Read-only
    # would force us to either tmpfs the whole /data (loses persistence)
    # or run with a wider capability set than is worth the trade.
    cap_drop:
      - ALL
    cap_add:
      # Image entrypoint runs as root, chowns /data, drops to valkey
      # user. SETUID/SETGID/CHOWN/DAC_READ_SEARCH/FOWNER are the standard
      # "drop to non-root" capability quintet.
      - SETUID
      - SETGID
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # ─── NATS ─────────────────────────────────────────────────────────
  nats:
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # ─── Prometheus ───────────────────────────────────────────────────
  prometheus:
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ─── Grafana ──────────────────────────────────────────────────────
  grafana:
    # Strip the dev loopback binding — Grafana is reached via Caddy under
    # /grafana with auth in production.
    ports: []
    environment:
      # GRAFANA_ADMIN_PASSWORD must be set in the production .env. The
      # base compose has admin/admin for local dev only.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ─── Loki ─────────────────────────────────────────────────────────
  loki:
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ─── Promtail ─────────────────────────────────────────────────────
  promtail:
    cap_drop:
      - ALL
    cap_add:
      # Promtail reads /var/lib/docker/containers/*.log which is owned
      # by root; needs DAC_READ_SEARCH to bypass the perms check.
      - DAC_READ_SEARCH
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ─── Postgres backup sidecar ──────────────────────────────────────
  # Runs pg_dump nightly at 02:30 UTC inside the same compose stack.
  # Output goes to a named volume + (optional) external rclone target.
  # 28-day rolling retention. Implemented as a slim Alpine image with
  # cron + postgres-client.
  #
  # Tier-E hardening (v0.2.1): when BACKUP_AGE_RECIPIENT is set in the
  # environment, each dump is age-encrypted before it lands on disk.
  # The operator holds the corresponding age private key on a separate
  # device (YubiKey, offline laptop) so a full compromise of the host
  # volume leaks only ciphertext. See docs/BACKUP.md for the operator
  # key-setup runbook.
  pg-backup:
    image: postgres:16.4-alpine
    container_name: slothbox-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_RETENTION_DAYS=28
      # Optional. When set to an `age1…` recipient, dumps are
      # age-encrypted before they touch the volume. Multiple recipients
      # can be passed as a comma-separated list — each gets a copy of
      # the dump file key in the age header, any one private key
      # decrypts. Unset = plaintext gzip dumps (v0.1 behaviour).
      - BACKUP_AGE_RECIPIENT=${BACKUP_AGE_RECIPIENT:-}
    volumes:
      - pg_backups:/backups
    networks:
      - internal
    cap_drop:
      - ALL
    security_opt: *default-security
    logging: *default-logging
    # In-process backup loop. The Alpine postgres image only ships busybox
    # date (no GNU `date -d`), so we compute "next 02:30 UTC" via integer
    # arithmetic on epoch seconds:
    #   1. SECS_TODAY = (NOW % 86400) — seconds elapsed today since 00:00
    #   2. TARGET_SECS_TODAY = 9000 (02:30:00 = 2*3600 + 30*60)
    #   3. If we're past today's window, schedule tomorrow's; otherwise today
    # First iteration also runs an immediate dump so a fresh deploy isn't
    # left without a backup overnight.
    #
    # Backups land at:
    #   /backups/<db>-<iso8601-utc>.sql.gz       (plaintext path)
    #   /backups/<db>-<iso8601-utc>.sql.gz.age   (age-encrypted path)
    # Retention applies to BOTH suffixes via the unified `find` glob.
    entrypoint: >
      /bin/sh -c "
      set -eu;
      mkdir -p /backups;
      if [ -n \"$${BACKUP_AGE_RECIPIENT:-}\" ] && ! command -v age >/dev/null 2>&1; then
        echo '[backup] installing age (offsite encryption recipient configured)';
        apk add --no-cache age >/dev/null;
      fi;
      run_dump() {
        TS=$$(date -u +%Y-%m-%dT%H-%M-%SZ);
        if [ -n \"$${BACKUP_AGE_RECIPIENT:-}\" ]; then
          FILE=/backups/$${POSTGRES_DB}-$${TS}.sql.gz.age;
          echo \"[backup] starting age-encrypted dump -> $$FILE\";
          # age recipients can be comma-separated. We map them to
          # repeated -r flags. The pipeline is dump -> gzip -> age, so
          # the on-disk artefact is gzip-then-age (age over already
          # compressed bytes — gzip can't compress age ciphertext).
          AGE_FLAGS=$$(echo \"$${BACKUP_AGE_RECIPIENT}\" | tr ',' '\\n' | awk '{print \"-r \"$$0}' | tr '\\n' ' ');
          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER -d $$POSTGRES_DB --no-owner --no-acl --clean --if-exists | gzip -9 | age $$AGE_FLAGS > $$FILE.tmp;
        else
          FILE=/backups/$${POSTGRES_DB}-$${TS}.sql.gz;
          echo \"[backup] starting plaintext dump -> $$FILE\";
          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER -d $$POSTGRES_DB --no-owner --no-acl --clean --if-exists | gzip -9 > $$FILE.tmp;
        fi;
        mv $$FILE.tmp $$FILE;
        echo \"[backup] dump complete: $$(du -h $$FILE | cut -f1)\";
        echo \"[backup] pruning dumps older than $${BACKUP_RETENTION_DAYS} days\";
        find /backups \\( -name '*.sql.gz' -o -name '*.sql.gz.age' \\) -mtime +$${BACKUP_RETENTION_DAYS} -delete;
        echo \"[backup] done\";
      };
      echo '[backup] performing initial dump on container start';
      run_dump || echo '[backup] initial dump failed; will retry at next slot';
      while :; do
        NOW=$$(date -u +%s);
        SECS_TODAY=$$((NOW % 86400));
        TARGET=9000;
        if [ \"$$SECS_TODAY\" -lt \"$$TARGET\" ]; then
          SLEEP=$$((TARGET - SECS_TODAY));
        else
          SLEEP=$$((86400 - SECS_TODAY + TARGET));
        fi;
        echo \"[backup] sleeping $${SLEEP}s until next 02:30 UTC slot\";
        sleep $$SLEEP;
        run_dump || echo '[backup] dump failed; will retry tomorrow';
      done
      "
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─── Tor hidden-service sidecar ───────────────────────────────────
  # Optional. When enabled, exposes slothbox.philipsloth.com over a
  # .onion address as an additional ingress. Traffic-analysis-resistant
  # transport for senders in adverse jurisdictions; the EU-only data
  # path stays unchanged (Tor circuits land at the Hetzner VM the same
  # way the public IP does).
  #
  # The container runs the official Tor Project upstream image, points
  # a HiddenService at the internal caddy:80 endpoint, and writes the
  # generated .onion address + private keypair into a named volume.
  # The operator backs that volume up out-of-band — losing it
  # rotates the .onion address.
  #
  # Activation is opt-in: this service is in the prod overlay but has
  # `profiles: [tor]` so it only starts when the operator runs
  # `docker compose --profile tor up -d`. Default deployments stay
  # public-only.
  tor:
    image: dperson/torproxy:latest
    container_name: slothbox-tor
    restart: unless-stopped
    profiles:
      - tor
    environment:
      # The torrc file we mount overrides the image's default;
      # documented in infra/tor/torrc.example.
      - TORUSER=tor
    volumes:
      - ./infra/tor/torrc:/etc/tor/torrc:ro
      - tor_hidden_service:/var/lib/tor/hidden_service
    networks:
      - internal
    depends_on:
      caddy:
        condition: service_started
    cap_drop:
      - ALL
    cap_add:
      # Tor needs to bind privileged ports inside the container only
      # if running on <1024; the image's default config binds 9050.
      # We keep cap_add empty for defence-in-depth and rely on the
      # non-root user the image already sets up.
      - SETUID
      - SETGID
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.20"

# Add the backup volume so pg-backup can persist its dumps + the
# Tor hidden-service volume so the .onion key survives container
# restarts (without this, every restart mints a new .onion address).
volumes:
  pg_backups:
  tor_hidden_service:
