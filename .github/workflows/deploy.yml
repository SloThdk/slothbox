name: Deploy

# Two jobs:
#  1. build  — multi-arch Docker build for all 5 services, push to GHCR.
#              Runs on every master push and every v* tag.
#  2. deploy — SSH to the production VM and `docker compose pull` + `up -d`.
#              Gated behind the repo variable AUTO_DEPLOY=true so it only
#              fires when secrets are configured. Manual workflow_dispatch
#              runs always attempt deploy.
#
# Build platforms intentionally include linux/arm64 because the production
# VM is ARM. linux/amd64 is kept so contributors can `docker pull` on a
# normal x86 dev box and run the full stack locally.

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        # `context` is the build context Docker uploads. `file` is the path to
        # the Dockerfile relative to that context. The two TS workspaces use
        # the monorepo root as context (their Dockerfiles reference the root
        # package.json + pnpm-lock.yaml + workspace packages); the .NET / Go
        # services are self-contained so their context can be the service
        # directory itself.
        include:
          - image: web
            context: .
            file: ./apps/web/Dockerfile
          - image: api-gateway
            context: .
            file: ./apps/api-gateway/Dockerfile
          - image: ingest
            context: ./services/ingest
            file: ./services/ingest/Dockerfile
          - image: receipt
            context: ./services/receipt
            file: ./services/receipt/Dockerfile
          - image: reaper
            context: ./services/reaper
            file: ./services/reaper/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/slothdk/slothbox-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          # Multi-arch. The production VM is ARM; contributors tend to dev
          # on AMD64. Both platforms get pushed under the same tag and Docker
          # pulls the right one based on the host's arch.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    # Use `needs: [build]` with `if: !cancelled() && ...` so a single
    # matrix-build failure (e.g. a transient GHCR `permission_denied:
    # write_package` on one image, which has bitten the reaper job
    # twice) does NOT block the deploy. The actual production server
    # rebuilds images LOCALLY from the freshly-checked-out source —
    # the GHCR push is for distributing images to anyone who wants to
    # pull them, NOT a hard prerequisite for the deploy itself. We
    # still want the deploy to wait for builds to *attempt* (so a
    # syntactic Dockerfile error surfaces in the build job's logs
    # before we touch prod), but we don't gate on every build's
    # success status.
    needs: [build]
    runs-on: ubuntu-24.04
    environment: production
    # Only attempt SSH deploy when AUTO_DEPLOY is enabled in repo variables
    # OR the workflow was triggered manually. Without this gate the job
    # would fail on every push for any fork that hasn't configured the
    # 3 production secrets (HETZNER_HOST / HETZNER_USER / HETZNER_SSH_KEY).
    # Note: GitHub Actions does not allow `secrets.*` in `if:` clauses, so
    # gating on a repo *variable* (vars.AUTO_DEPLOY) is the canonical
    # workaround.
    #
    # `!cancelled()` lets the deploy run even if `build` failed — the
    # local rebuild on the VM is what actually matters; GHCR push is
    # advisory.
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || (vars.AUTO_DEPLOY == 'true' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # Real install path is /home/slothbox/slothbox (per the slothbox
          # user's homedir).
          #
          # Deploy strategy (current):
          #   fetch + reset --hard → rebuild changed images locally on the
          #   box → up -d → ps → prune
          #
          # Why fetch + reset --hard rather than `git pull --ff-only`:
          #   The VM is a deploy target, not a source-of-truth for local
          #   commits. A previous deploy run on 2026-05-08 silently failed
          #   the entire content rollout because `git pull --ff-only` hit
          #   "Diverging branches can't be fast-forwarded, aborting" — the
          #   SSH-action script then continued (the workflow runner was
          #   not in `set -e` for the script body) and the build ran
          #   against the STALE checkout. The image was rebuilt, the
          #   container was recreated, the smoke test on /healthz passed,
          #   and the live site served old code. Hard-reset to
          #   origin/master makes the deploy idempotent regardless of
          #   the VM's local git state and matches what a deploy step
          #   should actually mean.
          #
          # We rebuild locally instead of `docker compose pull` because the
          # production overlay leaves `image:` lines commented out — the
          # source-of-truth images are still being built from the local
          # context (until we flip to GHCR-pinned images). `--build` on
          # `up -d` rebuilds any service whose Dockerfile or build context
          # changed since the last run; unchanged services are no-ops.
          # `--remove-orphans` cleans containers from removed services.
          #
          # `set -euo pipefail` belt-and-braces: appleboy/ssh-action runs
          # the script through `bash -e` already, but the prior incident
          # showed that single-line `git pull` failures didn't reliably
          # abort the run — explicit bash safety leaves no ambiguity.
          script: |
            set -euo pipefail
            cd /home/slothbox/slothbox
            echo "→ fetching origin/master"
            git fetch --prune origin master
            echo "→ resetting working tree to origin/master ($(git rev-parse --short origin/master))"
            git reset --hard origin/master
            echo "→ HEAD is now $(git rev-parse HEAD)"
            export IMAGE_TAG=${{ github.sha }}

            # Bring the postgres container up first so `pnpm db:migrate`
            # below has something to connect to. `up -d postgres` is a
            # no-op when postgres is already running, and starts it
            # otherwise. We do this BEFORE the migrations run so the
            # migration runner doesn't race the postgres init phase.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d postgres

            # Apply any pending migrations BEFORE the new app images go
            # live — the new app code may reference columns / functions
            # that only the new migrations create, so the migrations
            # have to land first or the app containers crash-loop on
            # boot. The migrate runner is idempotent (tracks applied
            # migrations in `_migrations`) so it's safe to call on
            # every deploy. We invoke it inside a one-shot Node
            # container that mounts the repo + reads DATABASE_URL from
            # the same .env the compose stack uses — no extra secrets,
            # no host-Node dependency.
            #
            # Why this lives in deploy and not in an init container:
            # the docker-compose.yml mounts ./db/migrations into the
            # postgres image's /docker-entrypoint-initdb.d, which only
            # runs on FIRST container init — adding a new migration
            # file after the postgres container has been initialised
            # silently does nothing. `pnpm db:migrate` is the
            # idempotent forward path.
            echo "→ applying pending migrations"
            # Find the actual compose-created network name. Compose
            # picks `<project>_default` by default but `<project>` is
            # whatever directory the stack was started from; we resolve
            # it here so the deploy doesn't break if someone renames
            # the install path. The `head -1` guards the rare case
            # where multiple slothbox-prefixed networks coexist
            # (cleanup didn't fire on a previous teardown).
            NETWORK=$(docker network ls --format '{{.Name}}' | grep -E '^slothbox' | head -1)
            if [ -z "$NETWORK" ]; then
              echo "  ✗ could not resolve slothbox docker network — aborting"
              exit 1
            fi
            echo "  using network $NETWORK"
            docker run --rm \
              --network "$NETWORK" \
              --env-file .env \
              -v "$(pwd):/app" \
              -w /app \
              node:20-alpine \
              sh -c "corepack enable && pnpm install --filter @slothbox/db --no-frozen-lockfile && pnpm --filter @slothbox/db migrate"

            # Now bring the rest of the stack up. `up -d` recreates any
            # container whose image, environment, or build context
            # changed; unchanged containers stay up.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            # Prune build cache + dangling images so /var/lib/docker doesn't
            # grow unbounded on a 40 GB volume. -f skips the y/N prompt.
            docker image prune -f
            docker builder prune -f --keep-storage 2GB

      - name: Smoke test
        # Hits the production domain (defaults to slothbox.philipsloth.com)
        # to verify the new revision is actually serving HTTP 200 AND that
        # the rendered HTML contains the current commit's short SHA. The
        # commit-SHA check exists because of the 2026-05-08 incident: the
        # VM's git pull silently failed, the build ran against stale
        # source, /healthz still returned 200, and the live site shipped
        # the previous revision while the workflow reported success. The
        # SHA stamp is injected at build time via NEXT_PUBLIC_BUILD_SHA in
        # apps/web/Dockerfile and rendered into the page footer + a
        # <meta name="x-build-sha"> tag — so an SHA mismatch is a hard
        # signal that the deployed bundle is not the one we just built.
        # PRODUCTION_DOMAIN can be overridden as a repo secret if we ever
        # move to a different domain.
        env:
          PROD_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        run: |
          set -euo pipefail
          DOMAIN="${PROD_DOMAIN:-slothbox.philipsloth.com}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "Smoke-testing https://$DOMAIN (expecting build SHA $SHORT_SHA)"

          # 1. /healthz must return 200 — proves the gateway is up.
          for i in {1..30}; do
            CODE=$(curl -fsS -o /dev/null -w "%{http_code}" "https://$DOMAIN/healthz" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "  ✓ /healthz returned 200 on attempt $i"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "  ✗ /healthz never returned 200 — aborting"
              exit 1
            fi
            echo "  attempt $i: got HTTP $CODE, retrying in 2s"
            sleep 2
          done

          # 2. The rendered homepage must contain the current commit's
          #    short SHA. If not, the VM built against stale source — the
          #    failure mode the 2026-05-08 incident exposed.
          for i in {1..15}; do
            HTML=$(curl -fsS "https://$DOMAIN/" || echo "")
            if echo "$HTML" | grep -q "$SHORT_SHA"; then
              echo "  ✓ build SHA $SHORT_SHA found in rendered HTML on attempt $i"
              echo "deployment verified"
              exit 0
            fi
            echo "  attempt $i: SHA $SHORT_SHA not yet in HTML, retrying in 2s"
            sleep 2
          done
          echo "  ✗ build SHA $SHORT_SHA never appeared in rendered HTML"
          echo "  this means the deploy ran but the live bundle is from a previous revision"
          echo "  — most likely the VM's working tree wasn't reset to origin/master."
          exit 1
