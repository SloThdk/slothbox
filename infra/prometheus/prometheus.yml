global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: slothbox
    env: ${ENV:-dev}

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2019"]
    metrics_path: /metrics

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:3022"]
    metrics_path: /metrics

  - job_name: ingest
    static_configs:
      - targets: ["ingest:3023"]
    metrics_path: /metrics

  - job_name: receipt
    static_configs:
      - targets: ["receipt:3024"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    # postgres-exporter is optional; uncomment in compose if needed

  - job_name: valkey
    static_configs:
      - targets: ["valkey-exporter:9121"]
    # valkey-exporter is optional; uncomment in compose if needed
