# SlothBox — local + base compose file
#
# Usage:
#   Development: docker compose up -d
#   Production : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All service-to-service traffic stays on the `internal` network.
# Only Caddy is bound to host ports for public ingress.

services:
  # ─── Reverse proxy + auto-HTTPS ─────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: slothbox-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - internal
    depends_on:
      web:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      ingest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: slothbox-web
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_INGEST_URL=${NEXT_PUBLIC_INGEST_URL}
      - NEXT_PUBLIC_MAX_FILE_SIZE_MB=${NEXT_PUBLIC_MAX_FILE_SIZE_MB:-4096}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3021/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── API gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: slothbox-api-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=3022
      - API_HOST=0.0.0.0
      - API_CORS_ORIGIN=${API_CORS_ORIGIN}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NATS_URL=${NATS_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3022/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Ingest service (.NET) ──────────────────────────────────
  ingest:
    build:
      context: ./services/ingest
      dockerfile: Dockerfile
      # Pass the host arch through so the .NET RID maps correctly. Buildkit
      # auto-sets TARGETARCH only on multi-platform builds via buildx; with
      # plain `docker compose build` it falls back to the ARG default in the
      # Dockerfile (amd64) which produces wrong-arch binaries on ARM hosts.
      # Override here from the .env so prod (cax11=arm64) gets ARM and
      # local x86 dev gets amd64.
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    container_name: slothbox-ingest
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${NODE_ENV:-Development}
      - ASPNETCORE_URLS=http://+:3023
      - INGEST_PORT=3023
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-slothbox-blobs}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-Information}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    healthcheck:
      # Liveness only — the /healthz endpoint pings postgres/minio/valkey
      # with bounded timeouts internally. start_period is generous because
      # cold-start of the .NET runtime + MinIO bucket-existence probe takes
      # a few seconds.
      test: ["CMD", "wget", "-qO-", "http://localhost:3023/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Receipt service (.NET) — v0.5+ stub ────────────────────
  receipt:
    build:
      context: ./services/receipt
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    container_name: slothbox-receipt
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${NODE_ENV:-Development}
      - ASPNETCORE_URLS=http://+:3024
      - RECEIPT_PORT=3024
      - DATABASE_URL=${DATABASE_URL}
      - RECEIPT_TSA_URL=${RECEIPT_TSA_URL:-https://freetsa.org/tsr}
      - LOG_LEVEL=${LOG_LEVEL:-Information}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3024/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Reaper daemon (Go) ─────────────────────────────────────
  reaper:
    build:
      context: ./services/reaper
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    container_name: slothbox-reaper
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-slothbox-blobs}
      - REAPER_INTERVAL_SECONDS=${REAPER_INTERVAL_SECONDS:-60}
      - REAPER_BATCH_SIZE=${REAPER_BATCH_SIZE:-100}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Postgres ───────────────────────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    container_name: slothbox-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind to loopback only — never reachable from the LAN. Prod compose
      # removes this binding entirely (see docker-compose.prod.yml).
      - "127.0.0.1:5433:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible blob store) ───────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: slothbox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_REGION=${MINIO_REGION:-eu-central-1}
    volumes:
      - minio_data:/data
    ports:
      # Loopback-only — MinIO has S3 API at :9000 (services use the internal
      # docker network) and an admin console at :9001 with default creds in
      # local dev. Either port reachable from the LAN with default creds is a
      # one-curl pivot to all ciphertext, so dev binds to 127.0.0.1 only and
      # prod compose removes the binding entirely.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MinIO bucket bootstrap (one-shot) ──────────────────────
  # Creates the slothbox-blobs bucket on first compose up. Without this the
  # ingest service's bucket-existence check fails on every health probe and
  # the container reports unhealthy until the operator manually creates the
  # bucket via the MinIO console. service_completed_successfully on this
  # entry is the gate for ingest startup.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: slothbox-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal
    environment:
      - MC_HOST_minio=http://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@minio:9000
    entrypoint: >
      /bin/sh -c "
      set -eu;
      echo '[minio-init] checking bucket ${MINIO_BUCKET:-slothbox-blobs}';
      if mc ls minio/${MINIO_BUCKET:-slothbox-blobs} >/dev/null 2>&1; then
        echo '[minio-init] bucket already exists — nothing to do';
      else
        echo '[minio-init] creating bucket';
        mc mb --ignore-existing minio/${MINIO_BUCKET:-slothbox-blobs};
        mc anonymous set none minio/${MINIO_BUCKET:-slothbox-blobs};
        echo '[minio-init] bucket ready';
      fi
      "

  # ─── Valkey (Redis fork) ────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2.5-alpine
    container_name: slothbox-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NATS (pub/sub) ─────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: slothbox-nats
    restart: unless-stopped
    # `-m 8222` enables the HTTP monitoring endpoint that the healthcheck
    # below queries. Without it, /healthz responds with connection refused
    # and the container reports unhealthy forever.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - internal
    healthcheck:
      # NATS uses /healthz (not /varz — that's monitoring telemetry, not
      # liveness). nats:2.10-alpine doesn't ship wget, so we use the
      # nats-server binary to probe its own monitoring port via 127.0.0.1.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: slothbox-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: slothbox-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      # Loopback-only — Grafana ships with admin/admin in local dev, so we
      # never want the LAN to reach it. Prod fronts Grafana behind Caddy
      # under /grafana with proper auth (see docker-compose.prod.yml).
      - "127.0.0.1:3030:3000"
    networks:
      - internal
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started

  # ─── Loki (log aggregation) ─────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: slothbox-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - internal

  # ─── Promtail (log shipper) ─────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: slothbox-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - internal
    depends_on:
      loki:
        condition: service_started

# ─── Networks ──────────────────────────────────────────────────
networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: false  # Caddy needs egress for Let's Encrypt

# ─── Volumes ───────────────────────────────────────────────────
volumes:
  pg_data:
  minio_data:
  valkey_data:
  nats_data:
  prometheus_data:
  grafana_data:
  loki_data:
  caddy_data:
  caddy_config:
