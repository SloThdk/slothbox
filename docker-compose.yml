# SlothBox — local + base compose file
#
# Usage:
#   Development: docker compose up -d
#   Production : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All service-to-service traffic stays on the `internal` network.
# Only Caddy is bound to host ports for public ingress.

services:
  # ─── Reverse proxy + auto-HTTPS ─────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: slothbox-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - internal
    depends_on:
      web:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      ingest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Frontend ───────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: slothbox-web
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_INGEST_URL=${NEXT_PUBLIC_INGEST_URL}
      - NEXT_PUBLIC_MAX_FILE_SIZE_MB=${NEXT_PUBLIC_MAX_FILE_SIZE_MB:-4096}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3021/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── API gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: slothbox-api-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=3022
      - API_HOST=0.0.0.0
      - API_CORS_ORIGIN=${API_CORS_ORIGIN}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NATS_URL=${NATS_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3022/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Ingest service (.NET) ──────────────────────────────────
  ingest:
    build:
      context: ./services/ingest
      dockerfile: Dockerfile
    container_name: slothbox-ingest
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${NODE_ENV:-Development}
      - ASPNETCORE_URLS=http://+:3023
      - INGEST_PORT=3023
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-slothbox-blobs}
      - REDIS_URL=${REDIS_URL}
      - LOG_LEVEL=${LOG_LEVEL:-Information}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3023/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Receipt service (.NET) — v0.5+ stub ────────────────────
  receipt:
    build:
      context: ./services/receipt
      dockerfile: Dockerfile
    container_name: slothbox-receipt
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${NODE_ENV:-Development}
      - ASPNETCORE_URLS=http://+:3024
      - RECEIPT_PORT=3024
      - DATABASE_URL=${DATABASE_URL}
      - RECEIPT_TSA_URL=${RECEIPT_TSA_URL:-https://freetsa.org/tsr}
      - LOG_LEVEL=${LOG_LEVEL:-Information}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3024/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Reaper daemon (Go) ─────────────────────────────────────
  reaper:
    build:
      context: ./services/reaper
      dockerfile: Dockerfile
    container_name: slothbox-reaper
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-slothbox-blobs}
      - REAPER_INTERVAL_SECONDS=${REAPER_INTERVAL_SECONDS:-60}
      - REAPER_BATCH_SIZE=${REAPER_BATCH_SIZE:-100}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Postgres ───────────────────────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    container_name: slothbox-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible blob store) ───────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: slothbox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_REGION=${MINIO_REGION:-eu-central-1}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Valkey (Redis fork) ────────────────────────────────────
  valkey:
    image: valkey/valkey:7.2.5-alpine
    container_name: slothbox-valkey
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NATS (pub/sub) ─────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: slothbox-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: slothbox-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: slothbox-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3030:3000"
    networks:
      - internal
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started

  # ─── Loki (log aggregation) ─────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: slothbox-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - internal

  # ─── Promtail (log shipper) ─────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.1
    container_name: slothbox-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - internal
    depends_on:
      loki:
        condition: service_started

# ─── Networks ──────────────────────────────────────────────────
networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: false  # Caddy needs egress for Let's Encrypt

# ─── Volumes ───────────────────────────────────────────────────
volumes:
  pg_data:
  minio_data:
  valkey_data:
  nats_data:
  prometheus_data:
  grafana_data:
  loki_data:
  caddy_data:
  caddy_config:
