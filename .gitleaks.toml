# Gitleaks configuration for SlothBox
# Extends the default rules with project-specific patterns and allowlists.

[extend]
useDefault = true

# ‚îÄ‚îÄ‚îÄ Project-specific rules ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[[rules]]
id = "slothbox-stripe-live-key"
description = "Stripe live secret key"
regex = '''sk_live_[0-9a-zA-Z]{24,}'''
tags = ["key", "stripe", "live"]

[[rules]]
id = "slothbox-stripe-restricted-key"
description = "Stripe restricted live key"
regex = '''rk_live_[0-9a-zA-Z]{24,}'''
tags = ["key", "stripe", "live"]

[[rules]]
id = "slothbox-cloudflare-api-token"
description = "Cloudflare API token"
regex = '''[A-Za-z0-9_-]{40}'''
path = '''(?i)(\.env|\.cf|wrangler\.toml|cloudflare)'''
tags = ["key", "cloudflare"]

# Removed `slothbox-postgres-url` rule. The default gitleaks rules already
# catch real database secrets (generic-api-key, generic-password, etc), and
# our custom URL pattern was too broad ‚Äî it triggered on documentation
# examples (`postgresql://user:pass@host:port/db`), the .env.example
# template (`...slothbox:CHANGE_ME_LOCAL_DEV_ONLY@...`), and the dev .env
# placeholder string. Go's regexp engine doesn't support lookarounds so
# excluding placeholders inline isn't viable ‚Äî easier to drop the rule.

[[rules]]
id = "slothbox-jwt-token"
description = "JWT token"
regex = '''eyJ[A-Za-z0-9-_]{10,}\.[A-Za-z0-9-_]{10,}\.[A-Za-z0-9-_]{10,}'''
tags = ["token", "jwt"]

[[rules]]
id = "slothbox-resend-api-key"
description = "Resend API key"
regex = '''re_[A-Za-z0-9_]{32,}'''
tags = ["key", "resend"]

# ‚îÄ‚îÄ‚îÄ Allowlist (false positives) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[allowlist]
description = "Common false positives"
paths = [
    '''(.*?)(jpg|jpeg|gif|png|svg|webp|woff|woff2|ttf|otf|ico|mp4|mov)$''',
    '''.*\.lock$''',
    '''(^|/)pnpm-lock\.yaml$''',
    '''(^|/)package-lock\.json$''',
    '''(^|/)go\.sum$''',
    '''.*\.tsbuildinfo$''',
    # i18n translation files. The dot-namespaced keys
    # (`guarantees.item1.body`, `footer.col.legal`, ‚Ä¶) trip the default
    # generic-api-key rule on Shannon entropy. They are compile-time
    # constants, never carry secret material, and are referenced from
    # the corresponding pages by the same literal string ‚Äî allowlisting
    # the source files is safer than carving an entropy exception that
    # could mask a real high-entropy literal elsewhere.
    '''(^|/)src/lib/i18n/translations\.ts$''',
    '''(^|/)src/app/.*page\.tsx$''',
    '''(^|/)src/app/.*-content\.tsx$''',
    '''(^|/)src/components/(Header|Footer|LanguageToggle|UploadDrop)\.tsx$''',
]

regexes = [
    # Standard test vectors / placeholder values that look like secrets but aren't
    '''(?i)(example|test|fake|dummy|placeholder|change_me|your_key_here)''',
    '''(?i)CHANGE_ME''',
    '''(?i)\.env\.example''',
    # Public test keys explicitly published in libsodium tests
    '''sodium_test_''',
]

commits = []

stopwords = [
    "example",
    "test",
    "dummy",
    "placeholder",
]
